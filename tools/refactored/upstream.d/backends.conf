# upstream 정의
# 같은 host:port는 하나의 upstream으로 관리

# https://10.0.1.10:8080
upstream backend_10_8080 {
    server 10.0.1.10:8080;
    keepalive 32;
}

# https://10.0.1.20:8080
upstream backend_20_8080 {
    server 10.0.1.20:8080;
    keepalive 32;
}

# https://10.0.1.30:9090
upstream backend_30_9090 {
    server 10.0.1.30:9090;
    keepalive 32;
}

# https://10.0.1.40:3000
upstream backend_40_3000 {
    server 10.0.1.40:3000;
    keepalive 32;
}
