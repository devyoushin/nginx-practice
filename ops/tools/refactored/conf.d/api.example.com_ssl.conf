server {
        listen 443 ssl http2;
        server_name api.example.com;

        ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location /api/v1/users {
            include snippets/proxy_params.conf;
            proxy_pass https://backend_10_8080/api/v1/users;
        }

        location /api/v1/orders {
            include snippets/proxy_params.conf;
            proxy_pass https://backend_10_8080/api/v1/orders;
        }

        location /api/v1/products {
            include snippets/proxy_params.conf;
            proxy_pass https://backend_20_8080/api/v1/products;
        }

        location /api/v2/users {
            include snippets/proxy_params.conf;
            proxy_pass https://backend_10_8080/api/v2/users;
        }

        location /api/v2/orders {
            include snippets/proxy_params.conf;
            proxy_pass https://backend_10_8080/api/v2/orders;
        }

        location /ws {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_pass https://backend_30_9090/ws;
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
}
